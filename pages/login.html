<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود و ثبت‌نام | غول بازار</title>
  <link rel="stylesheet" href="css/output.css">
  <style>
    body { font-family: 'Vazirmatn', sans-serif; }
    .tab-active   { border-bottom: 2px solid #cf1736; color: #fff; }
    .tab-inactive { border-bottom: 2px solid transparent; color: rgba(255,255,255,0.45); }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #3a1f24 inset !important; -webkit-text-fill-color: #fff !important; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #2d161a; }
    ::-webkit-scrollbar-thumb { background: #47242a; border-radius: 4px; }
  </style>
</head>
<body class="bg-dark text-white font-vazir min-h-screen flex flex-col overflow-x-hidden">

  <!-- Ambient glows -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-accent/8 rounded-full blur-[140px] -translate-y-1/3 translate-x-1/4"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-[#47242a]/20 rounded-full blur-[120px] translate-y-1/3 -translate-x-1/4"></div>
  </div>

  <!-- Minimal header -->
  <header class="relative z-10 bg-dark/90 backdrop-blur-md">
    <div class="max-w-[1280px] mx-auto px-5 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <img src="assets/logo.png" alt="غول بازار" class="w-9 h-9 object-contain drop-shadow-[0_0_6px_rgba(207,23,54,0.5)]">
        <span class="font-display text-xl text-white tracking-wider">غول بازار</span>
      </a>
      <a href="index.html" class="text-sm text-text-dim hover:text-white transition-colors flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        بازگشت
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="relative z-10 flex-grow flex items-center justify-center py-10 px-4">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <img src="assets/logo.png" alt="" class="w-16 h-16 object-contain mx-auto mb-4 drop-shadow-[0_0_20px_rgba(207,23,54,0.4)]">
        <h1 class="font-display text-3xl text-white mb-1">Ghul Bazar</h1>
        <p class="text-muted text-sm">ورود یا ساخت حساب کاربری</p>
      </div>

      <div class="bg-dark rounded-2xl overflow-hidden shadow-[0_20px_60px_rgba(0,0,0,0.6)]">
        <!-- Tabs -->
        <div class="flex">
          <button id="tab-login" onclick="switchTab('login')" class="tab-active flex-1 py-4 text-sm font-bold tracking-wide transition-colors">ورود</button>
          <button id="tab-register" onclick="switchTab('register')" class="tab-inactive flex-1 py-4 text-sm font-bold tracking-wide transition-colors">ثبت‌نام</button>
        </div>

        <!-- Login Form -->
        <div id="form-login" class="p-6 md:p-8">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-text-dim mb-1.5" for="login-phone">شماره همراه</label>
              <input type="text" id="login-phone" dir="rtl" autocomplete="phone" placeholder="09123456789" class="w-full bg-dark-3 rounded-xl px-4 py-3 text-white text-sm placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
            </div>
            <div>
              <div class="flex items-center justify-between mb-1.5">
                <a href="#" class="text-xs text-muted hover:text-accent transition-colors">فراموشی رمز</a>
                <label class="text-sm font-medium text-text-dim" for="login-password">رمز عبور</label>
              </div>
              <div class="relative">
                <input type="password" id="login-password" dir="rtl" autocomplete="current-password" placeholder="••••••••" class="w-full bg-dark-3 rounded-xl px-4 py-3 text-white text-sm placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
                <button type="button" onclick="togglePass('login-password',this)" class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-muted/50 hover:text-muted transition-colors select-none">نمایش</button>
              </div>
            </div>
            <div class="flex items-center justify-end gap-2">
              <label for="remember" class="text-sm text-text-dim cursor-pointer select-none">مرا به خاطر بسپار</label>
              <input type="checkbox" id="remember" class="w-4 h-4 accent-accent rounded cursor-pointer">
            </div>
            <div id="login-error" class="hidden text-xs text-red-300 bg-red-900/20 border border-red-800/30 rounded-lg px-3 py-2 text-right"></div>
            <button id="login-btn" onclick="doLogin()" class="w-full py-3.5 bg-accent hover:bg-accent-hover text-white text-sm font-bold rounded-xl transition-all shadow-[0_6px_20px_rgba(207,23,54,0.3)]">
              <span id="login-btn-text">ورود به حساب</span>
            </button>
          </div>
          <div class="relative flex items-center gap-3 my-5">
            <div class="flex-1 h-px bg-border"></div>
            <span class="text-text-dim text-xs shrink-0">یا</span>
            <div class="flex-1 h-px bg-border"></div>
          </div>
          <button onclick="switchTab('register')" class="w-full py-3 border border-border rounded-xl text-sm text-text-dim hover:border-accent/40 hover:text-white transition-all">
            حساب ندارید؟ <span class="text-accent font-bold">ثبت‌نام کنید</span>
          </button>
        </div>

        <!-- Register Form -->
        <div id="form-register" class="hidden p-6 md:p-8">
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
              <div><label class="block text-sm font-medium text-text-dim mb-1.5">نام</label><input type="text" id="reg-fname" autocomplete="given-name" placeholder="نام" class="w-full bg-dark-3 rounded-xl px-4 py-3 text-white text-sm placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors"></div>
              <div><label class="block text-sm font-medium text-text-dim mb-1.5">نام خانوادگی</label><input type="text" id="reg-lname" autocomplete="family-name" placeholder="نام خانوادگی" class="w-full bg-dark-3 rounded-xl px-4 py-3 text-white text-sm placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors"></div>
            </div>
            <div><label class="block text-sm font-medium text-text-dim mb-1.5">شماره همراه</label><input type="text" id="reg-phone" dir="rtl" autocomplete="phone" placeholder="09123456789" class="w-full bg-dark-3 rounded-xl px-4 py-3 text-white text-sm placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors"></div>
            <div>
              <label class="block text-sm font-medium text-text-dim mb-1.5">رمز عبور</label>
              <div class="relative">
                <input type="password" id="reg-password" dir="rtl" autocomplete="new-password" placeholder="حداقل ۸ کاراکتر" class="w-full bg-dark-3 rounded-xl px-4 py-3 text-white text-sm placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors">
                <button type="button" onclick="togglePass('reg-password',this)" class="absolute left-3 top-1/2 -translate-y-1/2 text-xs text-muted/50 hover:text-muted transition-colors select-none">نمایش</button>
              </div>
            </div>
            <div><label class="block text-sm font-medium text-text-dim mb-1.5">تکرار رمز عبور</label><input type="password" id="reg-confirm" dir="rtl" autocomplete="new-password" placeholder="••••••••" class="w-full bg-dark-3 rounded-xl px-4 py-3 text-white text-sm placeholder:text-muted/35 focus:outline-none focus:border-accent transition-colors"></div>
            <div class="flex items-start gap-2">
              <input type="checkbox" id="terms" class="mt-1 w-4 h-4 accent-accent rounded cursor-pointer shrink-0">
              <label for="terms" class="text-xs text-text-dim leading-relaxed cursor-pointer">با <a href="#" class="text-accent hover:underline">قوانین و مقررات</a> موافقم</label>
            </div>
            <div id="register-error" class="hidden text-xs text-red-300 bg-red-900/20 border border-red-800/30 rounded-lg px-3 py-2 text-right"></div>
            <button id="register-btn" onclick="doRegister()" class="w-full py-3.5 bg-accent hover:bg-accent-hover text-white text-sm font-bold rounded-xl transition-all shadow-[0_6px_20px_rgba(207,23,54,0.3)]">
              <span id="register-btn-text">ساخت حساب</span>
            </button>
          </div>
          <button onclick="switchTab('login')" class="w-full mt-4 py-3 rounded-xl text-sm text-text-dim hover:border-accent/40 hover:text-white transition-all">
            حساب دارید؟ <span class="text-accent font-bold">وارد شوید</span>
          </button>
        </div>
      </div>
      <p class="text-center text-xs text-text-dim/40 mt-5">© ۱۴۰۴ غول بازار</p>
    </div>
  </main>
  <script src="js/apiClient.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
