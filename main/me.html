            <div><label class="block text-sm text-muted text-right mb-1">نام و نام‌خانوادگی *</label><input type="text" id="customer-name" required class="w-full bg-dark border border-border rounded-lg px-4 py-3 text-white text-right" placeholder="علی احمدی"></div>
            <div><label class="block text-sm text-muted text-right mb-1">شماره موبایل *</label><input type="tel" id="customer-phone" required dir="ltr" class="w-full bg-dark border border-border rounded-lg px-4 py-3 text-white text-left" placeholder="09123456789"></div>
            <div><label class="block text-sm text-muted text-right mb-1">آدرس کامل *</label><textarea id="shipping-address" required rows="3" class="w-full bg-dark border border-border rounded-lg px-4 py-3 text-white text-right resize-none" placeholder="استان، شهر، خیابان، کوچه، پلاک، واحد"></textarea></div>
          </div>
        </div>
        <div class="bg-dark-2 border border-border rounded-xl p-6">
          <h2 class="text-lg font-bold text-right mb-4">کد تخفیف</h2>
          <div class="flex gap-2" dir="ltr">
            <button id="apply-discount" class="px-4 py-2.5 bg-dark-3 border border-border rounded-lg text-sm hover:border-accent transition-colors shrink-0">اعمال</button>
            <input type="text" id="discount-input" placeholder="کد تخفیف..." dir="rtl" class="flex-1 bg-dark border border-border rounded-lg px-3 py-2.5 text-sm text-white">
          </div>
          <p id="discount-msg" class="text-xs mt-2 text-right hidden"></p>
        </div>
        <p id="form-error" class="hidden text-accent text-sm text-right"></p>
        <button id="submit-btn" class="w-full py-4 bg-accent text-white font-bold text-lg rounded-xl hover:bg-accent-hover transition-all">ثبت سفارش</button>
      </div>
      <div class="md:col-span-2">
        <div class="bg-dark-2 border border-border rounded-xl p-6 sticky top-24">
          <h2 class="text-lg font-bold text-right mb-6">سفارش شما</h2>
          <div id="order-items" class="space-y-3 mb-4 max-h-64 overflow-y-auto"></div>
          <div class="border-t border-border pt-4 space-y-2" id="price-breakdown"></div>
          <div class="border-t border-border mt-4 pt-4"><div class="flex justify-between font-bold text-lg"><span id="checkout-total"></span><span>مجموع</span></div></div>
        </div>
      </div>
    </div>
  </div>
</template>

<!-- Template: Orders Page -->
<template id="tmpl-orders">
  <div class="flex-grow max-w-[1280px] mx-auto w-full px-4 md:px-10 py-10 md:py-14">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-10 gap-4 border-b border-border pb-8">
      <div><h1 class="text-2xl md:text-3xl font-black text-white mb-1">سفارشات من</h1><p class="text-text-dim text-sm">سوابق خرید و پیگیری وضعیت ارسال</p></div>
      <div class="flex gap-3"><a href="#shop" class="flex items-center gap-2 px-4 py-2 bg-accent hover:bg-accent-hover text-white text-sm font-bold rounded-lg transition-colors">خرید جدید</a></div>
    </div>
    <div id="loading" class="text-center py-20 text-text-dim"><p class="text-4xl animate-pulse mb-3">✦</p><p>در حال بارگذاری...</p></div>
    <div id="need-login" class="hidden text-center py-20">
      <p class="text-xl text-text-dim mb-6">برای مشاهده سفارشات وارد شوید</p>
      <a href="login.html" class="inline-block px-8 py-3 bg-accent text-white rounded-lg hover:bg-accent-hover font-bold">ورود به حساب</a>
    </div>
    <div id="empty-orders" class="hidden text-center py-20"><p class="text-xl text-text-dim mb-6">هنوز سفارشی ثبت نشده</p><a href="#shop" class="inline-block px-8 py-3 bg-accent text-white rounded-lg hover:bg-accent-hover font-bold">رفتن به فروشگاه</a></div>
    <div id="orders-content" class="hidden">
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">
        <div class="bg-dark-2 border border-border rounded-2xl p-5 text-right"><p class="text-xs text-muted mb-1">سفارشات جاری</p><h3 class="text-3xl text-white font-black" id="stat-active">۰</h3></div>
        <div class="bg-dark-2 border border-border rounded-2xl p-5 text-right"><p class="text-xs text-muted mb-1">کل خریدها</p><h3 class="text-3xl text-white font-black" id="stat-total">۰</h3></div>
        <div class="bg-dark-2 border border-border rounded-2xl p-5 text-right"><p class="text-xs text-muted mb-1">مجموع هزینه</p><h3 class="text-2xl text-white font-black" id="stat-amount">۰ تومان</h3></div>
      </div>
      <div class="bg-dark-2 border border-border rounded-2xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="w-full text-right min-w-[600px]">
            <thead><tr class="border-b border-border bg-dark-3/60"><th class="py-3.5 px-5 text-xs font-bold text-muted">شماره سفارش</th><th class="py-3.5 px-5 text-xs font-bold text-muted">تاریخ</th><th class="py-3.5 px-5 text-xs font-bold text-muted hidden sm:table-cell">اقلام</th><th class="py-3.5 px-5 text-xs font-bold text-muted">مبلغ</th><th class="py-3.5 px-5 text-xs font-bold text-muted">وضعیت</th><th class="py-3.5 px-5 text-xs font-bold text-muted">عملیات</th></tr></thead>
            <tbody id="orders-table" class="divide-y divide-border"></tbody>
          </table>
        </div>
        <div class="flex items-center justify-between border-t border-border bg-dark-3/40 px-5 py-3"><p class="text-xs text-text-dim" id="pagination-info"></p><div class="flex gap-1" id="pagination-nav"></div></div>
      </div>
    </div>
  </div>
</template>

<!-- Template: Payment Page -->
<template id="tmpl-payment">
  <div class="border-b border-border bg-dark-2/60">
    <div class="max-w-[1280px] mx-auto px-5 py-3 flex items-center gap-2 text-xs text-text-dim overflow-x-auto whitespace-nowrap">
      <a href="#cart" class="hover:text-white transition-colors">سبد خرید</a><span class="text-border">›</span>
      <a href="#checkout" class="hover:text-white transition-colors">اطلاعات ارسال</a><span class="text-border">›</span>
      <span class="text-accent font-bold">پرداخت</span>
    </div>
  </div>
  <div class="max-w-4xl mx-auto px-5 py-10 flex-1">
    <div id="summary-container" class="bg-dark-2 border border-border rounded-2xl p-6 mb-8">
      <h2 class="text-xl font-bold mb-6">جزئیات سفارش</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div><p class="text-sm text-text-dim">شماره سفارش</p><p id="order-number" class="text-2xl font-bold text-white">-</p><button onclick="copyText('order-number')" class="mt-2 text-xs bg-dark-3 px-3 py-1 rounded-lg hover:bg-accent/20 transition">کپی</button></div>
        <div><p class="text-sm text-text-dim">مبلغ قابل پرداخت</p><p id="total-amount" class="text-2xl font-bold text-green-400 ltr">0</p></div>
      </div>
      <div class="mt-6 p-4 bg-dark-3 border border-border rounded-lg">
        <p class="text-text-dim text-sm mb-2">لطفاً مبلغ فوق را به شماره کارت زیر واریز کرده و تصویر رسید را بارگذاری نمایید.</p>
        <div class="bg-dark border border-border rounded-lg p-4 flex items-center justify-between">
          <span id="card-number" class="font-bold text-white ltr text-lg">6037-9975-XXXX-XXXX</span>
          <button onclick="copyText('card-number')" class="text-xs bg-accent px-4 py-2 rounded-lg hover:bg-accent-hover transition-colors">کپی شماره کارت</button>
        </div>
      </div>
    </div>
    <div class="bg-dark-2 border border-border rounded-2xl p-6">
      <h3 class="text-lg font-bold mb-4">آپلود رسید پرداخت</h3>
      <div class="space-y-4">
        <label class="block w-full cursor-pointer bg-dark-3 border border-border rounded-xl p-6 text-center hover:border-accent transition-colors">
          <span id="upload-ph" class="text-text-dim block">برای انتخاب تصویر کلیک کنید (JPG, PNG, WebP)</span>
          <span id="upload-preview" class="hidden text-green-400">فایل انتخاب شد: <strong id="file-name"></strong></span>
          <input type="file" id="receipt-input" class="hidden" accept="image/*" onchange="handleFile(this)">
        </label>
        <button id="submit-receipt-btn" onclick="submitReceipt()" class="w-full py-3 bg-accent text-white font-bold rounded-xl hover:bg-accent-hover transition-all disabled:opacity-60">ارسال رسید</button>
      </div>
      <p id="upload-error" class="hidden text-accent text-sm mt-3"></p>
    </div>
  </div>
</template>

<!-- Copy Toast -->
<div id="copy-toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg z-50">کپی شد!</div>

<!-- Scripts -->
<script src="js/apiClient.js"></script>
<script src="js/swiper.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
