<!DOCTYPE html>
<html lang="fa" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#450a0a">
    <title>ورود به پنل مدیریت | فروشگاه</title>
    <link rel="stylesheet" href="../assets/css/output.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* استایل‌های پایه و اسکرول‌بار سفارشی */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #a8a29e; border-radius: 20px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background-color: #7f1d1d; }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-scaleIn { animation: scaleIn 0.25s ease-out; }
    </style>
</head>
<body class="bg-stone-100 dark:bg-red-950 text-stone-800 dark:text-stone-200 font-sans antialiased min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-stone-100/80 dark:bg-red-950/80 backdrop-blur-sm z-[100] flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-red-700 border-t-transparent"></div>
    </div>

    <div class="w-full max-w-md">
        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-red-800 to-red-900 rounded-2xl flex items-center justify-center shadow-lg shadow-red-900/20 mx-auto mb-4">
                <i data-lucide="store" class="text-white w-10 h-10"></i>
            </div>
            <h1 class="text-2xl font-bold text-stone-800 dark:text-white">پنل مدیریت</h1>
            <p class="text-stone-500 dark:text-stone-400 mt-2">برای ادامه وارد حساب کاربری خود شوید</p>
        </div>

        <!-- Login Form Card -->
        <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 rounded-2xl shadow-2xl p-6 md:p-8 animate-scaleIn transition-colors">
            <div id="alertBox" class="hidden mb-6 px-4 py-3 rounded-xl border text-sm"></div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label for="phone" class="block text-stone-600 dark:text-stone-400 mb-2 text-sm font-medium">شماره تلفن</label>
                    <div class="relative">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 dark:text-stone-500">
                            <i data-lucide="phone" class="w-5 h-5"></i>
                        </span>
                        <input type="text" id="phone" name="phone" placeholder="مثال: ۰۹۱۲۳۴۵۶۷۸۹" dir="ltr" autocomplete="tel" required
                            class="w-full bg-stone-50 dark:bg-stone-800 border border-stone-300 dark:border-stone-700 rounded-xl px-4 py-3.5 pr-10 text-stone-800 dark:text-white placeholder:text-stone-400 dark:placeholder:text-stone-500 focus:border-red-700 focus:ring-2 focus:ring-red-700/20 transition-all outline-none">
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-stone-600 dark:text-stone-400 mb-2 text-sm font-medium">رمز عبور</label>
                    <div class="relative">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 dark:text-stone-500">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </span>
                        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required
                            class="w-full bg-stone-50 dark:bg-stone-800 border border-stone-300 dark:border-stone-700 rounded-xl px-4 py-3.5 pr-10 text-stone-800 dark:text-white placeholder:text-stone-400 dark:placeholder:text-stone-500 focus:border-red-700 focus:ring-2 focus:ring-red-700/20 transition-all outline-none">
                        <button type="button" onclick="togglePassword()" class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 dark:text-stone-500 hover:text-stone-600 dark:hover:text-stone-300 transition-colors">
                            <i id="toggleIcon" data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-red-800 hover:bg-red-900 text-white py-3.5 rounded-xl font-medium transition-all duration-200 flex items-center justify-center gap-2 shadow-lg shadow-red-900/20 active:scale-[0.98]">
                    <i data-lucide="log-in" class="w-5 h-5"></i>
                    <span>ورود به پنل</span>
                </button>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-stone-200 dark:border-stone-800"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white dark:bg-stone-900 text-stone-400 dark:text-stone-500">فروشگاه آنلاین</span>
                </div>
            </div>

            <p class="text-center text-stone-400 dark:text-stone-500 text-xs">
                <i data-lucide="shield-check" class="inline w-4 h-4 ml-1"></i> دسترسی فقط برای مدیران فروشگاه
            </p>
        </div>
        
        <!-- دکمه تغییر تم -->
        <div class="mt-6 text-center">
            <button onclick="toggleTheme()" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-white dark:bg-stone-800 border border-stone-200 dark:border-stone-700 text-stone-600 dark:text-stone-300 hover:bg-stone-50 dark:hover:bg-stone-700 transition-colors text-sm">
                <i id="themeIcon" data-lucide="sun" class="w-4 h-4"></i>
                <span id="themeLabel">حالت روشن</span>
            </button>
        </div>
    </div>
    <script type="module" src="../assets/js/adminLogin.js"></script>
</body>
</html>
