components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by auth endpoints.
  parameters:
    XTenant:
      name: X-Tenant
      in: header
      required: false
      schema:
        type: string
      description: Tenant domain override (optional for local default tenant)
    CSRF:
      name: X-CSRF-TOKEN
      in: header
      required: false
      schema:
        type: string
      description: Required for most POST/PUT/DELETE requests unless endpoint is explicitly exempt in middleware.
  responses:
    MessageResponse:
      description: Message response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageOnly'
    CartResponse:
      description: Cart payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CartResponse'
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        status:
          type: integer
    MessageOnly:
      type: object
      properties:
        message:
          type: string
    MessageWithId:
      type: object
      properties:
        message:
          type: string
        user_id:
          type: integer
    IdResponse:
      type: object
      properties:
        id:
          type: integer
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    PhoneRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
    OtpVerifyRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string
    AuthLoginRequest:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
        password:
          type: string
    RegisterRequest:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
        password:
          type: string
        full_name:
          type: string
        email:
          type: string
    RegisterShopRequest:
      type: object
      required: [store_name, domain, phone, password]
      properties:
        store_name:
          type: string
        domain:
          type: string
        phone:
          type: string
        password:
          type: string
        full_name:
          type: string
    RegisterShopResponse:
      type: object
      properties:
        message:
          type: string
        tenant_id:
          type: integer
        domain:
          type: string
        admin_login:
          type: object
          properties:
            url:
              type: string
            phone:
              type: string
    User:
      type: object
      properties:
        id:
          type: integer
        tenant_id:
          type: integer
        phone:
          type: string
        email:
          type: string
          nullable: true
        full_name:
          type: string
          nullable: true
        role:
          type: string
        is_active:
          type: integer
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
        new_password:
          type: string
    Address:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        tenant_id:
          type: integer
        label:
          type: string
        province:
          type: string
          nullable: true
        city:
          type: string
        postal_code:
          type: string
          nullable: true
        full_address:
          type: string
        latitude:
          type: number
          nullable: true
        longitude:
          type: number
          nullable: true
        is_default:
          type: integer
    AddressRequest:
      type: object
      properties:
        label:
          type: string
        province:
          type: string
        city:
          type: string
        postal_code:
          type: string
        full_address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        is_default:
          type: integer
    AuthTokenResponse:
      type: object
