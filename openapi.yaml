openapi: 3.0.3
info:
  title: NadStore API
  version: 1.0.0
  description: >
    All routes are served by the custom dispatcher in `public/index.php`.
    The actual base URL is: `http://{domain}/index.php?url=`.
    In docs, routes are shown as path segments for readability (for example
    `/auth/login` means `?url=auth/login`).
servers:
  - url: "http://{domain}"
    variables:
      domain:
        default: localhost
    description: Tenant domain (or DEFAULT_TENANT_DOMAIN on local environments).
tags:
  - name: Authentication
  - name: Users
  - name: Products
  - name: Categories
  - name: Cart
  - name: Coupons
  - name: Orders
  - name: Password
  - name: Payment
  - name: Tenants
  - name: System
paths:
  /auth/login:
    post:
      tags: [Authentication]
      summary: Login with phone and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a customer (inactive until phone verification)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: OTP sent to phone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageWithId'
  /auth/verifyPhone:
    post:
      tags: [Authentication]
      summary: Verify registration OTP and activate account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OTP verified and tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
  /auth/sendLoginOtp:
    post:
      tags: [Authentication]
      summary: Send OTP for passwordless login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneRequest'
      responses:
        '200':
          description: OTP request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnly'
  /auth/verifyLoginOtp:
    post:
      tags: [Authentication]
      summary: Verify OTP and login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token pair refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
  /auth/logout:
    post:
      tags: [Authentication]
      summary: Revoke a refresh token
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnly'
  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
  /auth/registerShop:
    post:
      tags: [Authentication]
      summary: Register a tenant shop and tenant admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterShopRequest'
      responses:
        '201':
          description: Store created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterShopResponse'

  /user:
    get:
      tags: [Users]
      summary: List users (superadmin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: search
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
        - name: tenant_id
          in: query
          schema:
            type: integer
        - name: is_active
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedData'
  /user/profile:
    get:
      tags: [Users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
      responses:
        '200':
          description: Profile loaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
    put:
      tags: [Users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                email:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
  /user/changePassword:
    put:
      tags: [Users]
      summary: Change password
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /user/changePhone:
    put:
      tags: [Users]
      summary: Change phone number
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_phone]
              properties:
                new_phone:
                  type: string
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /user/getAddresses:
    get:
      tags: [Users]
      summary: List current user addresses
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
      responses:
        '200':
          description: Addresses list
          content:
            application/json:
              schema:
                type: object
                properties:
                  addresses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Address'
  /user/addAddress:
    post:
      tags: [Users]
      summary: Add address
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdResponse'
  /user/updateAddress/{id}:
    put:
      tags: [Users]
      summary: Update user address
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /user/{id}/updateAddress:
    put:
      tags: [Users]
      summary: Update user address (alternate route)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /user/deleteAddress/{id}:
    delete:
      tags: [Users]
      summary: Delete user address
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /user/{id}/changeRole:
    put:
      tags: [Users]
      summary: Change user role (superadmin, alternate route)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
  /user/{id}/toggleStatus:
    put:
      tags: [Users]
      summary: Enable or disable user (superadmin, alternate route)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_active]
              properties:
                is_active:
                  type: integer
                  enum: [0, 1]
      responses:
        '200':
          description: User status changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
  /user/{id}/deleteAddress:
    delete:
      tags: [Users]
      summary: Delete user address (alternate route)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /user/changeRole/{id}:
    put:
      tags: [Users]
      summary: Change user role (superadmin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
  /user/toggleStatus/{id}:
    put:
      tags: [Users]
      summary: Enable or disable user (superadmin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_active]
              properties:
                is_active:
                  type: integer
                  enum: [0, 1]
      responses:
        '200':
          description: User status changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'

  /products:
    get:
      tags: [Products]
      summary: List products
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: page
          in: query
          schema:
            type: integer
        - name: per_page
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedData'
    post:
      tags: [Products]
      summary: Create product (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
  /products/featured:
    get:
      tags: [Products]
      summary: List featured products
      parameters:
        - $ref: '#/components/parameters/XTenant'
      responses:
        '200':
          description: Featured products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
  /products/discounted:
    get:
      tags: [Products]
      summary: List discounted products
      parameters:
        - $ref: '#/components/parameters/XTenant'
      responses:
        '200':
          description: Discounted products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
  /products/byCategory/{categoryId}:
    get:
      tags: [Products]
      summary: List products by category
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Category products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
  /products/{id}:
    get:
      tags: [Products]
      summary: Get single product with images
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
  /products/{id}/update:
    put:
      tags: [Products]
      summary: Update product (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
  /products/update/{id}:
    put:
      tags: [Products]
      summary: Update product (admin, alternate route)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
  /products/{id}/destroy:
    delete:
      tags: [Products]
      summary: Delete product (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /products/destroy/{id}:
    delete:
      tags: [Products]
      summary: Delete product (admin, alternate route)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /products/{id}/uploadImage:
    post:
      tags: [Products]
      summary: Upload product image (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                alt:
                  type: string
                sort_order:
                  type: integer
                  default: 0
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  alt:
                    type: string

  /products/uploadImage:
    post:
      tags: [Products]
      summary: Upload product image using product_id in multipart form (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image, product_id]
              properties:
                product_id:
                  type: integer
                image:
                  type: string
                  format: binary
                alt:
                  type: string
                sort_order:
                  type: integer
                  default: 0
      responses:
        '201':
          description: Image uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  alt:
                    type: string

  /categories:
    get:
      tags: [Categories]
      summary: List main categories
      parameters:
        - $ref: '#/components/parameters/XTenant'
      responses:
        '200':
          description: Main category list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
    post:
      tags: [Categories]
      summary: Create category (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
  /categories/{id}:
    get:
      tags: [Categories]
      summary: Get category by id + children
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
  /categories/subcategories/{parentId}:
    get:
      tags: [Categories]
      summary: Get subcategories of a parent category
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - name: parentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Subcategories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
  /categories/{id}/update:
    put:
      tags: [Categories]
      summary: Update category (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
  /categories/update/{id}:
    put:
      tags: [Categories]
      summary: Update category (admin, alternate route)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
  /categories/{id}/destroy:
    delete:
      tags: [Categories]
      summary: Delete category (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'
  /categories/destroy/{id}:
    delete:
      tags: [Categories]
      summary: Delete category (admin, alternate route)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          $ref: '#/components/responses/MessageResponse'

  /cart:
    get:
      tags: [Cart]
      summary: Get user cart
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
      responses:
        '200':
          description: Cart with items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
  /cart/addItem:
    post:
      tags: [Cart]
      summary: Add cart item
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, quantity]
              properties:
                product_id:
                  type: integer
                quantity:
                  type: integer
      responses:
        '201':
          $ref: '#/components/responses/CartResponse'
  /cart/updateItem/{itemId}:
    put:
      tags: [Cart]
      summary: Update cart item quantity
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/CSRF'
        - name: itemId
          in: path
